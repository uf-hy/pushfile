<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 - PushFile</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --border-color: rgba(0, 0, 0, 0.1);
            --primary-color: #0066cc;
            --primary-hover: #0077ed;
            --error-color: #ff3b30;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --card-bg: rgba(28, 28, 30, 0.8);
                --text-primary: #f5f5f7;
                --text-secondary: #86868b;
                --border-color: rgba(255, 255, 255, 0.1);
                --primary-color: #2997ff;
                --primary-hover: #40a6ff;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            animation: fadeIn 0.5s ease-out;
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .logo {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        input[type="password"] {
            width: 100%;
            padding: 1rem 1.2rem;
            font-size: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: transparent;
            color: var(--text-primary);
            transition: all 0.2s ease;
            outline: none;
        }

        input[type="password"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.1s ease, opacity 0.2s ease;
        }

        .login-btn:hover {
            opacity: 0.9;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-message {
            color: var(--error-color);
            font-size: 0.85rem;
            margin-top: 1rem;
            min-height: 1.2rem;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .error-message.show {
            opacity: 1;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <i class="ph ph-lock-key logo"></i>
            <h1>PushFile</h1>
            <p class="subtitle">请输入访问密码</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <input type="password" id="passwordInput" placeholder="密码" required autofocus>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">登录</button>
                <div class="error-message" id="errorMessage">密码错误，请重试</div>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('loginForm');
            const passwordInput = document.getElementById('passwordInput');
            const loginBtn = document.getElementById('loginBtn');
            const errorMessage = document.getElementById('errorMessage');

            // 检查是否已经登录
            const currentKey = localStorage.getItem('pushfile_admin_key');
            if (currentKey) {
                verifyToken(currentKey).then(isValid => {
                    if (isValid) {
                        redirectBack();
                    }
                });
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const password = passwordInput.value.trim();
                
                if (!password) return;

                loginBtn.disabled = true;
                loginBtn.textContent = '验证中...';
                errorMessage.classList.remove('show');

                try {
                    const isValid = await verifyToken(password);
                    
                    if (isValid) {
                        localStorage.setItem('pushfile_admin_key', password);
                        redirectBack();
                    } else {
                        showError('密码错误，请重试');
                    }
                } catch (error) {
                    showError('网络错误，请稍后重试');
                } finally {
                    loginBtn.disabled = false;
                    loginBtn.textContent = '登录';
                }
            });

            function showError(msg) {
                errorMessage.textContent = msg;
                errorMessage.classList.add('show');
                passwordInput.value = '';
                passwordInput.focus();
            }

            async function verifyToken(token) {
                try {
                    const response = await fetch(`/api/tokens?key=${encodeURIComponent(token)}`);
                    return response.ok;
                } catch (e) {
                    console.error('Token verification failed:', e);
                    return false;
                }
            }

            function redirectBack() {
                const urlParams = new URLSearchParams(window.location.search);
                const redirect = urlParams.get('redirect') || '/';
                window.location.href = redirect;
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PushFile Admin</title>
    <!-- 预加载 Phosphor Icons 字体文件 -->
    <link rel="preconnect" href="https://unpkg.com" crossorigin>
    <link rel="preload" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" as="style">
    <link rel="preload" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" as="style">
    
    <link rel="stylesheet" href="{{ base }}/static/admin/style.css?v={{ asset_version }}">
    <link rel="stylesheet" href="{{ base }}/static/admin/components/FolderSelector.css?v={{ asset_version }}">
    
    <style>
        /* 骨架屏动画 */
        @keyframes skeleton-pulse {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .skeleton-inline {
            display: inline-block;
            width: 50px;
            height: 22px;
            background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: skeleton-pulse 1.5s ease-in-out infinite;
            border-radius: 6px;
            vertical-align: middle;
        }
        /* 访客模式遮罩 */
        .guest-mode-disabled {
            opacity: 0.5;
            pointer-events: none;
            cursor: not-allowed;
            position: relative;
        }
        .guest-mode-disabled::after {
            content: '访客模式';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.7);
            border-radius: inherit;
            font-size: 0.8rem;
            color: var(--color-text-secondary, #666);
        }
        /* 柱状图样式 */
        .card-stats .card-body {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            min-height: 280px;
        }
        .chart-placeholder {
            height: 172px;
            margin: 6px -4px 0;
            display: flex;
            align-items: stretch;
            justify-content: stretch;
        }
        .chart-summary {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            margin-top: 18px;
        }
        .chart-summary-item {
            padding: 12px 14px;
            border-radius: 16px;
            background: linear-gradient(180deg, rgba(245, 245, 247, 0.92), rgba(255, 255, 255, 0.98));
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
        }
        .chart-summary-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--color-text-tertiary);
            margin-bottom: 6px;
        }
        .chart-summary-value {
            display: block;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1;
            color: var(--color-text-primary);
        }
        .chart-summary-meta {
            display: block;
            margin-top: 6px;
            font-size: 12px;
            color: var(--color-text-secondary);
        }
        .chart-summary-item.is-today .chart-summary-value {
            color: var(--color-warning);
        }
        @media (max-width: 720px) {
            .chart-summary {
                grid-template-columns: 1fr;
            }
            .card-stats .card-body {
                min-height: auto;
            }
        }
    </style>
    
    <!-- 异步加载 Phosphor Icons，并添加加载状态类 -->
    <script>
        document.documentElement.classList.add('icons-loading');
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web" async onload="document.documentElement.classList.remove('icons-loading')"></script>
    <!-- 引入 Inter 字体作为备选，优先使用系统字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="{{ base }}/static/admin/vendor/chart.umd.min.js?v={{ asset_version }}"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
    <script>
        window.__BASE__ = '{{ base }}';
        document.documentElement.style.visibility = 'hidden';
    </script>
<body>
    <div class="app-container">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="header-content">
                <div class="logo-area">
                    <div class="logo-icon">
                        <i class="ph-fill ph-paper-plane-tilt"></i>
                    </div>
                    <div class="logo-text">
                        <h1>PushFile</h1>
                        <span class="version-badge">v2.0.0</span>
                    </div>
                </div>
                <div class="header-actions">
                    <div class="user-avatar" onclick="openModal('userMenuModal')" title="账号">
                        <img src="https://ui-avatars.com/api/?name=Admin&background=0D8ABC&color=fff&rounded=true" alt="Admin">
                    </div>
                </div>
            </div>
        </header>

        <!-- 主要内容区 -->
        <main class="main-content">
            <div class="greeting">
                <h2>早上好，Admin</h2>
                <p id="greetingText">正在加载数据...</p>
            </div>

            <!-- Bento Grid 布局 -->
            <div class="bento-grid">
                <div class="bento-card card-manage span-2">
                    <div class="card-bg-decoration"></div>
                    <div class="card-header">
                        <div class="card-icon-wrapper primary">
                            <i class="ph ph-images"></i>
                        </div>
                        <h3>相册管理</h3>
                    </div>
                    <div class="card-body">
                        <div class="stats-row">
                            <div class="stat-item">
                                <span class="stat-value" id="statPhotos"><span class="skeleton-inline"></span></span>
                                <span class="stat-label">总照片数</span>
                            </div>
                            <div class="stat-divider"></div>
                            <div class="stat-item">
                                <span class="stat-value" id="statAlbums"><span class="skeleton-inline"></span></span>
                                <span class="stat-label">相册</span>
                            </div>
                            <div class="stat-divider"></div>
                            <div class="stat-item">
                                <span class="stat-value text-success" id="statVisitors"><span class="skeleton-inline"></span></span>
                                <span class="stat-label">今日访问</span>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <button type="button" class="btn btn-primary" id="uploadBtn" data-test="upload-btn" onclick="openModal('uploadModal')">
                            <i class="ph ph-upload-simple"></i>
                            上传照片
                        </button>
                        <button type="button" class="btn btn-secondary" onclick="go('/manage/album')">
                            浏览全部
                            <i class="ph ph-arrow-right"></i>
                        </button>
                    </div>
                </div>

                <!-- 创作卡片 -->
                <div class="bento-card card-create">
                    <div class="card-header">
                        <div class="card-icon-wrapper accent">
                            <i class="ph ph-magic-wand"></i>
                        </div>
                        <div class="header-text">
                            <h3>创作中心</h3>
                            <p>生成分享链接与二维码</p>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="quick-actions">
                            <div class="action-item" onclick="go('/grid')">
                                <div class="action-icon"><i class="ph ph-squares-four"></i></div>
                                <span>九宫格</span>
                            </div>
                            <div class="action-item" onclick="alert('该功能正在开发中喵～ 敬请期待！')">
                                <div class="action-icon"><i class="ph ph-qr-code"></i></div>
                                <span>二维码</span>
                            </div>
                            <div class="action-item" onclick="alert('该功能正在开发中喵～ 敬请期待！')">
                                <div class="action-icon"><i class="ph ph-lock-key"></i></div>
                                <span>加密分享</span>
                            </div>
                            <div class="action-item" onclick="alert('该功能正在开发中喵～ 敬请期待！')">
                                <div class="action-icon"><i class="ph ph-clock"></i></div>
                                <span>阅后即焚</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 统计卡片 -->
                <div class="bento-card card-stats">
                    <div class="card-header">
                        <div class="card-icon-wrapper warning">
                            <i class="ph ph-chart-line-up"></i>
                        </div>
                        <div class="header-text">
                            <h3>访问统计</h3>
                            <p>近期访问趋势</p>
                        </div>
                        <button type="button" class="btn-text" style="margin-left: auto;" onclick="go('/manage/dashboard')">查看全部</button>
                    </div>
                    <div class="card-body">
                        <div class="chart-placeholder" id="chartPlaceholder">
                            <canvas id="dailyChart"></canvas>
                        </div>
                        <div class="chart-summary">
                            <div class="chart-summary-item is-today">
                                <span class="chart-summary-label">今天</span>
                                <span class="chart-summary-value" id="chartTodayValue">-</span>
                                <span class="chart-summary-meta" id="chartTodayMeta">暂无数据</span>
                            </div>
                            <div class="chart-summary-item">
                                <span class="chart-summary-label">近 7 天</span>
                                <span class="chart-summary-value" id="chartWeekValue">-</span>
                                <span class="chart-summary-meta">累计访问</span>
                            </div>
                            <div class="chart-summary-item">
                                <span class="chart-summary-label">峰值日</span>
                                <span class="chart-summary-value" id="chartPeakValue">-</span>
                                <span class="chart-summary-meta" id="chartPeakMeta">暂无峰值</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bento-card card-recent span-2">
                    <div class="card-header">
                        <div class="card-icon-wrapper success">
                            <i class="ph ph-clock-counter-clockwise"></i>
                        </div>
                        <div class="header-text">
                            <h3>最近活动</h3>
                            <p>照片上传与下载动态</p>
                        </div>
                        <button type="button" class="btn-text" style="margin-left: auto;" onclick="go('/manage/dashboard')">查看全部</button>
                    </div>
                    <div class="card-body">
                        <div class="activity-list" id="activityList">
                            <div class="activity-item">
                                <div class="activity-icon file-image">
                                    <i class="ph ph-image"></i>
                                </div>
                                <div class="activity-content">
                                    <div class="activity-title">加载中...</div>
                                    <div class="activity-meta">请稍候</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal" id="uploadModal" style="display:none" onclick="if(event.target===this) closeModal('uploadModal')">
        <div class="modal-content">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
                <h3 style="margin:0;">上传文件</h3>
                <button type="button" class="icon-btn" onclick="closeModal('uploadModal')"><i class="ph ph-x"></i></button>
            </div>

            <div class="upload-drop-zone" id="homeUploadZone" style="margin-top:12px;border:2px dashed var(--color-border);border-radius:16px;padding:18px;text-align:center;cursor:pointer;">
                <i class="ph ph-upload-simple" style="font-size:28px;color:var(--color-text-secondary);"></i>
                <div style="margin-top:8px;font-weight:600;">点击选择 或 拖拽图片/ZIP</div>
                <div style="margin-top:4px;font-size:13px;color:var(--color-text-secondary);">移动端不支持拖拽时，点击选择即可</div>
                <input type="file" id="homeUploadFileInput" accept="image/*,.zip" multiple hidden>
                <input type="file" id="homeUploadFolderInput" webkitdirectory multiple hidden>
                <div style="display:flex;gap:10px;justify-content:center;margin-top:12px;flex-wrap:wrap;">
                    <button type="button" class="btn btn-secondary" id="homeChooseFilesBtn"><i class="ph ph-image"></i> 选图片/ZIP</button>
                    <button type="button" class="btn btn-secondary" id="homeChooseFolderBtn"><i class="ph ph-folder"></i> 选文件夹</button>
                </div>
            </div>

            <div id="homeUploadPreview" style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:12px;"></div>

            <div style="margin-top:12px;display:flex;align-items:center;justify-content:space-between;gap:12px;">
                <div style="font-size:13px;color:var(--color-text-secondary);">保存到</div>
                <button type="button" class="btn btn-secondary" id="homeChooseDestBtn"><i class="ph ph-folder"></i> 选择位置</button>
            </div>
            <div id="homeUploadDest" style="margin-top:6px;font-size:13px;color:var(--color-text-secondary);word-break:break-all;">未选择</div>

            <div class="modal-actions" style="margin-top:14px;display:flex;gap:10px;justify-content:flex-end;">
                <button type="button" class="btn btn-secondary" onclick="closeModal('uploadModal')">取消</button>
                <button type="button" class="btn btn-primary" id="homeUploadStartBtn">开始上传</button>
            </div>
        </div>
    </div>

    <div class="modal" id="activityActionModal" style="display:none" onclick="if(event.target===this) closeModal('activityActionModal')">
        <div class="modal-content">
            <h3>更多操作</h3>
            <p>功能开发中...</p>
            <button type="button" class="btn btn-secondary" onclick="closeModal('activityActionModal')">关闭</button>
        </div>
    </div>

    <div class="modal" id="userMenuModal" style="display:none" onclick="if(event.target===this) closeModal('userMenuModal')">
        <div class="modal-content">
            <h3>账号</h3>
            <p>你可以在这里退出登录。</p>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" onclick="closeModal('userMenuModal')">关闭</button>
                <button type="button" class="btn btn-primary" onclick="logout()">退出登录</button>
            </div>
        </div>
    </div>

    <script src="{{ base }}/static/admin/auth.js?v={{ asset_version }}"></script>
    <script src="{{ base }}/static/admin/components/FolderSelector.js?v={{ asset_version }}"></script>
    <script src="{{ base }}/static/admin/app.js?v={{ asset_version }}"></script>
</body>
</html>

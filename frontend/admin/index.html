<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PushFile Admin</title>
    <!-- 预加载 Phosphor Icons 字体文件 -->
    <link rel="preconnect" href="https://unpkg.com" crossorigin>
    <link rel="preload" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" as="style">
    <link rel="preload" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" as="style">
    
    <link rel="stylesheet" href="{{ base }}/static/admin/style.css">
    
    <!-- 异步加载 Phosphor Icons，并添加加载状态类 -->
    <script>
        document.documentElement.classList.add('icons-loading');
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web" async onload="document.documentElement.classList.remove('icons-loading')"></script>
    <!-- 引入 Inter 字体作为备选，优先使用系统字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="header-content">
                <div class="logo-area">
                    <div class="logo-icon">
                        <i class="ph-fill ph-paper-plane-tilt"></i>
                    </div>
                    <div class="logo-text">
                        <h1>PushFile</h1>
                        <span class="version-badge">v2.0.0</span>
                    </div>
                </div>
                <div class="header-actions">
                    <div class="user-avatar">
                        <img src="https://ui-avatars.com/api/?name=Admin&background=0D8ABC&color=fff&rounded=true" alt="Admin">
                    </div>
                </div>
            </div>
        </header>

        <!-- 主要内容区 -->
        <main class="main-content">
            <div class="greeting">
                <h2>早上好，Admin</h2>
                <p>今天的数据看起来不错，有 12 个新文件上传。</p>
            </div>

            <!-- Bento Grid 布局 -->
            <div class="bento-grid">
                <div class="bento-card card-manage span-2">
                    <div class="card-bg-decoration"></div>
                    <div class="card-header">
                        <div class="card-icon-wrapper primary">
                            <i class="ph ph-images"></i>
                        </div>
                        <h3>相册管理</h3>
                    </div>
                    <div class="card-body">
                        <div class="stats-row">
                            <div class="stat-item">
                                <span class="stat-value">1,284</span>
                                <span class="stat-label">总照片数</span>
                            </div>
                            <div class="stat-divider"></div>
                            <div class="stat-item">
                                <span class="stat-value">12</span>
                                <span class="stat-label">相册</span>
                            </div>
                            <div class="stat-divider"></div>
                            <div class="stat-item">
                                <span class="stat-value text-success">+24</span>
                                <span class="stat-label">新增访客</span>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <button type="button" class="btn btn-primary">
                            <i class="ph ph-upload-simple"></i>
                            上传照片
                        </button>
                        <button type="button" class="btn btn-secondary" onclick="location.href='/manage'">
                            浏览全部
                            <i class="ph ph-arrow-right"></i>
                        </button>
                    </div>
                </div>

                <!-- 创作卡片 -->
                <div class="bento-card card-create">
                    <div class="card-header">
                        <div class="card-icon-wrapper accent">
                            <i class="ph ph-magic-wand"></i>
                        </div>
                        <div class="header-text">
                            <h3>创作中心</h3>
                            <p>生成分享链接与二维码</p>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="quick-actions">
                            <div class="action-item" onclick="location.href='/#grid-view'">
                                <div class="action-icon"><i class="ph ph-squares-four"></i></div>
                                <span>九宫格</span>
                            </div>
                            <div class="action-item" onclick="alert('该功能正在开发中喵～ 敬请期待！')">
                                <div class="action-icon"><i class="ph ph-qr-code"></i></div>
                                <span>二维码</span>
                            </div>
                            <div class="action-item" onclick="alert('该功能正在开发中喵～ 敬请期待！')">
                                <div class="action-icon"><i class="ph ph-lock-key"></i></div>
                                <span>加密分享</span>
                            </div>
                            <div class="action-item" onclick="alert('该功能正在开发中喵～ 敬请期待！')">
                                <div class="action-icon"><i class="ph ph-clock"></i></div>
                                <span>阅后即焚</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 统计卡片 -->
                <div class="bento-card card-stats">
                    <div class="card-header">
                        <div class="card-icon-wrapper warning">
                            <i class="ph ph-chart-line-up"></i>
                        </div>
                        <div class="header-text">
                            <h3>访问统计</h3>
                            <p>本周访问趋势</p>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="chart-placeholder">
                            <!-- 纯 CSS 模拟的简单图表 -->
                            <div class="bar-chart">
                                <div class="bar" style="height: 40%"></div>
                                <div class="bar" style="height: 70%"></div>
                                <div class="bar" style="height: 50%"></div>
                                <div class="bar" style="height: 90%"></div>
                                <div class="bar" style="height: 60%"></div>
                                <div class="bar" style="height: 30%"></div>
                                <div class="bar active" style="height: 100%"></div>
                            </div>
                        </div>
                        <div class="chart-info">
                            <span class="trend up"><i class="ph ph-trend-up"></i> 24%</span>
                            <span class="trend-label">较上周增长</span>
                        </div>
                    </div>
                </div>

                <div class="bento-card card-recent span-2">
                    <div class="card-header">
                        <div class="card-icon-wrapper success">
                            <i class="ph ph-clock-counter-clockwise"></i>
                        </div>
                        <div class="header-text">
                            <h3>最近活动</h3>
                            <p>照片上传与下载动态</p>
                        </div>
                        <button type="button" class="btn-text" style="margin-left: auto;">查看全部</button>
                    </div>
                    <div class="card-body">
                        <div class="activity-list">
                            <div class="activity-item">
                                <div class="activity-icon file-image">
                                    <i class="ph ph-image"></i>
                                </div>
                                <div class="activity-content">
                                    <div class="activity-title">IMG_8492.jpg</div>
                                    <div class="activity-meta">由 Admin 上传 • 10 分钟前 • 2.4 MB</div>
                                </div>
                                <div class="activity-action">
                                    <button type="button" class="icon-btn small"><i class="ph ph-dots-three"></i></button>
                                </div>
                            </div>
                            
                            <div class="activity-item">
                                <div class="activity-icon file-image">
                                    <i class="ph ph-images"></i>
                                </div>
                                <div class="activity-content">
                                    <div class="activity-title">2024 团建照片集</div>
                                    <div class="activity-meta">创建了新相册 • 2 小时前 • 15 张照片</div>
                                </div>
                                <div class="activity-action">
                                    <button type="button" class="icon-btn small"><i class="ph ph-dots-three"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ base }}/static/admin/app.js"></script>
</body>
</html>

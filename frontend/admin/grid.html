<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九宫格制作 - PushFile</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="{{ base }}/static/admin/style.css?v={{ asset_version }}">
    <link rel="stylesheet" href="{{ base }}/static/admin/grid.css?v={{ asset_version }}">
    <link rel="stylesheet" href="{{ base }}/static/admin/components/FolderSelector.css?v={{ asset_version }}">
    <link rel="stylesheet" href="{{ base }}/static/admin/components/AsyncFeedback.css?v={{ asset_version }}">
</head>
<body>
    <div class="grid-page">
        <header class="grid-header">
            <button type="button" onclick="history.back()" class="back-btn"><i class="ph ph-arrow-left"></i></button>
            <h1>九宫格制作</h1>
        </header>
        <main class="grid-main">
            <div class="grid-workspace">
                <aside class="grid-sidebar">
                    <div class="empty-layout" id="emptyLayout">
                        <div class="upload-zone" id="uploadZone">
                            <div class="upload-icon"><i class="ph ph-image"></i></div>
                            <div class="upload-text">
                                <div class="upload-title" id="uploadTitle">点击或拖拽上传图片</div>
                                <div class="upload-sub" id="uploadSub">支持 JPG / PNG，上传后可随时更换</div>
                            </div>
                            <input type="file" id="fileInput" accept="image/*" hidden>
                        </div>

                        <section class="intro" id="intro">
                            <div class="intro-card">
                                <div class="intro-title">怎么用</div>
                                <ol class="intro-steps">
                                    <li>上传一张图片</li>
                                    <li>调整分割线 / 间距 / 背景，预览会实时更新</li>
                                    <li>下载 ZIP（含 9 张切图 + 预览图），也能直接保存</li>
                                </ol>
                                <div class="intro-chips">
                                    <span class="chip"><i class="ph ph-check-circle"></i>左右工作台，一眼看全</span>
                                    <span class="chip"><i class="ph ph-check-circle"></i>分割线与间距分开控制</span>
                                    <span class="chip"><i class="ph ph-check-circle"></i>PNG 支持透明背景</span>
                                </div>
                            </div>
                        </section>
                    </div>

                    <section class="panel" id="panel" style="display:none">
                        <div class="panel-card">
                            <div class="mobile-sheet-handle mobile-only" aria-hidden="true"></div>
                            <div class="panel-header">
                                <div>
                                    <div class="panel-title">参数</div>
                                </div>
                                <div class="panel-actions">
                                    <button type="button" class="btn btn-danger-soft btn-compact" id="resetBtn"><i class="ph ph-arrow-counter-clockwise"></i>重置</button>
                                    <button type="button" class="btn btn-secondary mobile-only" id="closePanelBtn"><i class="ph ph-check"></i>完成</button>
                                </div>
                            </div>

                            <div class="control-grid">
                                <div class="control">
                                    <div class="control-header">
                                        <div>
                                            <div class="control-label">分割线宽度</div>
                                            <div class="control-hint">线条本身有多粗</div>
                                        </div>
                                        <div class="control-value">
                                            <input class="number" type="number" id="lineWidthNumber" min="0" max="40" step="1" value="0">
                                            <span class="unit">px</span>
                                        </div>
                                    </div>
                                    <input type="range" id="lineWidth" min="0" max="40" value="0">
                                </div>

                                <div class="control">
                                    <div class="control-header">
                                        <div>
                                            <div class="control-label">图片间距</div>
                                            <div class="control-hint">线条两侧留多少呼吸感</div>
                                        </div>
                                        <div class="control-value">
                                            <input class="number" type="number" id="gapNumber" min="0" max="60" step="1" value="0">
                                            <span class="unit">px</span>
                                        </div>
                                    </div>
                                    <input type="range" id="gap" min="0" max="60" value="0">
                                </div>

                                <div class="control">
                                    <div class="control-header">
                                        <div>
                                            <div class="control-label">外边距</div>
                                            <div class="control-hint">整个成品外侧的留白</div>
                                        </div>
                                        <div class="control-value">
                                            <input class="number" type="number" id="paddingNumber" min="0" max="120" step="1" value="0">
                                            <span class="unit">px</span>
                                        </div>
                                    </div>
                                    <input type="range" id="padding" min="0" max="120" value="0">
                                </div>

                                <div class="control control-row">
                                    <div class="control-label">线色</div>
                                    <div class="control-value">
                                        <input type="color" id="lineColor" value="#ffffff" aria-label="线色">
                                        <input class="text" type="text" id="lineColorText" value="#ffffff" spellcheck="false">
                                    </div>
                                </div>

                                <div class="control control-row">
                                    <div class="control-label">背景</div>
                                    <div class="control-value">
                                        <input type="color" id="bgColor" value="#ffffff" aria-label="背景色">
                                        <input class="text" type="text" id="bgColorText" value="#ffffff" spellcheck="false">
                                    </div>
                                </div>

                                <div class="control control-row">
                                    <div class="control-label">格式</div>
                                    <div class="control-value">
                                        <select id="outputFormat" class="select">
                                            <option value="JPEG">JPG</option>
                                            <option value="PNG">PNG</option>
                                        </select>
                                        <label class="toggle">
                                            <input type="checkbox" id="transparentBg">
                                            <span>透明背景</span>
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <div class="actions" id="actions" style="display:none">
                        <button type="button" class="btn btn-primary" id="saveBtn"><i class="ph ph-folder-simple"></i>保存到文件夹</button>
                        <button type="button" class="btn btn-secondary" id="downloadBtn"><i class="ph ph-archive"></i>下载 ZIP</button>
                    </div>
                </aside>

                <section class="grid-stage">
                    <section class="stage-empty" id="stageEmpty">
                        <div class="stage-empty-card">
                            <div class="stage-empty-preview" aria-hidden="true">
                                <span></span><span></span><span></span>
                                <span></span><span class="is-accent"></span><span></span>
                                <span></span><span></span><span></span>
                            </div>
                            <div class="stage-empty-icon"><i class="ph ph-grid-nine"></i></div>
                            <div class="stage-empty-title">上传后会立即显示成品预览</div>
                            <div class="stage-empty-copy">上传图片后，这里会展示完整预览，方便直接确认效果并导出。</div>
                        </div>
                    </section>
                    <section class="preview" id="preview" style="display:none">
                        <div class="preview-header">
                            <div>
                                <div class="preview-title">实时预览</div>
                                <div class="preview-subtitle">先看成品预览，再按需调整参数或导出</div>
                            </div>
                            <div class="preview-actions">
                                <button type="button" class="btn btn-secondary mobile-only" id="togglePanelBtn"><i class="ph ph-sliders-horizontal"></i>调整参数</button>
                                <button type="button" class="btn btn-secondary" id="downloadPreviewBtn"><i class="ph ph-download-simple"></i>下载预览图</button>
                            </div>
                        </div>
                        <div class="preview-canvas-wrap">
                            <canvas id="previewCanvas"></canvas>
                        </div>
                        <div class="preview-meta" id="previewMeta"></div>
                    </section>

                </section>
            </div>
        </main>
    </div>
    <div class="mobile-sheet-backdrop" id="mobileSheetBackdrop" hidden></div>
    <script>window.__BASE__ = '{{ base }}';</script>
    <script src="{{ base }}/static/admin/auth.js?v={{ asset_version }}"></script>
    <script src="{{ base }}/static/admin/app.js?v={{ asset_version }}"></script>
    <script src="{{ base }}/static/admin/components/AsyncFeedback.js?v={{ asset_version }}"></script>
    <script src="{{ base }}/static/admin/components/FolderSelector.js?v={{ asset_version }}"></script>
    <script src="{{ base }}/static/admin/grid.js?v={{ asset_version }}"></script>
</body>
</html>

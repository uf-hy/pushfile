<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>PushFile Admin</title>
  <link rel="stylesheet" href="{{ base }}/static/admin/style.css">
</head>
<body>
  <div class="page">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo-box">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        </div>
        <div class="header-titles">
          <h1>PushFile</h1>
          <span class="version" id="versionBadge">v--</span>
        </div>
      </div>
      <div class="header-right">
        <span class="status-badge" id="connBadge">未连接</span>
      </div>
    </header>

    <!-- Login Section -->
    <div id="loginSection" class="bento-section">
      <div class="bento-card login-card">
        <h2>连接到服务器</h2>
        <p class="sub-text">请输入管理密码以继续</p>
        <div class="input-group">
          <input id="secret" type="password" placeholder="管理密码">
          <button class="btn btn-primary" type="button" onclick="connect()">连接</button>
        </div>
        <label class="checkbox-label">
          <input id="remember" type="checkbox">
          <span>记住密码（6天）</span>
        </label>
      </div>

      <div class="bento-card create-card">
        <h2>快速新建相册</h2>
        <div class="input-group">
          <input id="newTokenInput" type="text" placeholder="英文标识，如 trip-tokyo">
          <button class="btn btn-secondary" type="button" onclick="createToken()">创建</button>
        </div>
      </div>
    </div>

    <!-- Main Dashboard (hidden until connected) -->
    <div id="mainSection" style="display:none">
      <!-- Dashboard Grid -->
      <div class="bento-grid" id="dashboardGrid">
        <!-- Manage Card (Large) -->
        <div class="bento-card card-manage" onclick="openManage()">
          <div class="card-icon bg-blue">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
          </div>
          <div class="card-content">
            <h2>文件管理</h2>
            <p>管理相册、上传照片、整理目录</p>
            <div class="card-stats">
              <div class="stat-item">
                <span class="stat-value" id="dashAlbumCount">-</span>
                <span class="stat-label">个相册</span>
              </div>
            </div>
          </div>
          <div class="card-arrow">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
          </div>
        </div>

        <!-- Create Card (Medium) -->
        <div class="bento-card card-create" onclick="toggleGridTool()">
          <div class="card-icon bg-purple">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="3" y1="15" x2="21" y2="15"></line><line x1="9" y1="3" x2="9" y2="21"></line><line x1="15" y1="3" x2="15" y2="21"></line></svg>
          </div>
          <div class="card-content">
            <h2>九宫格创作</h2>
            <p>一键生成朋友圈九宫格</p>
          </div>
        </div>

        <!-- Analytics Card (Medium) -->
        <div class="bento-card card-analytics" onclick="toggleAnalytics()">
          <div class="card-icon bg-green">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
          </div>
          <div class="card-content">
            <h2>数据统计</h2>
            <div class="mini-stats">
              <span id="dashTodayViews">-</span> 今日访问
            </div>
          </div>
        </div>
      </div>

      <!-- Recent Activity -->
      <div class="recent-section" id="dashboardRecent">
        <h3 class="section-title">最近活动</h3>
        <div class="bento-card recent-card">
          <div class="empty-state">
            <span class="empty-icon">✨</span>
            <p>欢迎使用 PushFile</p>
            <small>点击上方卡片开始管理您的照片</small>
          </div>
        </div>
      </div>

      <!-- Sub Panels (Hidden by default) -->
      <div id="analyticsPanel" style="display:none" class="sub-panel"></div>
      <div id="gridPanel" style="display:none" class="sub-panel"></div>
      <div id="adminPanel" style="display:none" class="sub-panel"></div>
    </div>
  </div>

  <!-- Overlays and Modals -->
  <div class="grid-overlay" id="gridOverlay" onclick="toggleGridTool()"></div>
  <div class="sheet-bg" id="sheetBg" onclick="closeSheet()"></div>
  <div class="batch" id="batchBar"></div>
  <div class="toast" id="toast"></div>
  <div class="modal-bg" id="importModalBg" onclick="closeImportModal()"></div>
  <datalist id="folderPathOptions"></datalist>

  <script>
    window.__BASE__ = '{{ base }}';
    window.__DOMAIN__ = '{{ domain }}';
    window.__MAX_MB__ = Number('{{ max_mb }}');
    window.__APP_VERSION__ = '{{ app_version }}' || '1.1.0';
    window.__APP_BUILD_TIME__ = '{{ app_build_time }}' || '02-28 17:30';
  </script>
  <script src="{{ base }}/static/admin/app.js?v=20260228h3"></script>
</body>
</html>

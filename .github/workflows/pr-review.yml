name: PR AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Build read-only review from PR diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr.diff || true
          head -n 2000 /tmp/pr.diff > /tmp/pr.diff.short

          URL_KEY_HITS=$(grep -Eo '\?(key|token)=' /tmp/pr.diff.short | wc -l | tr -d ' ')
          PATH_PREFIX_HITS=$(grep -Eo 'startswith\(str\(' /tmp/pr.diff.short | wc -l | tr -d ' ')
          FULL_AUTO_HITS=$(grep -Eo 'exec --full-auto' /tmp/pr.diff.short | wc -l | tr -d ' ')
          WRITE_PERM_HITS=$(grep -Eo 'contents:\s*write' /tmp/pr.diff.short | wc -l | tr -d ' ')

          cat > /tmp/review_result.md <<EOF
          ## 审查模式

          本工作流运行在 GitHub Actions 沙盒中，采用**最小权限只读审查**：
          - 不使用仓库外部 API 密钥
          - 不执行自动改代码/自动推送
          - 仅基于 PR diff 进行静态规则检查并评论

          ## 规则扫描结果（基于本次 diff）

          - URL 凭证暴露模式（?key= / ?token=）：${URL_KEY_HITS}
          - 不安全路径前缀判断（startswith(str(...))）：${PATH_PREFIX_HITS}
          - 高风险自动执行模式（exec --full-auto）：${FULL_AUTO_HITS}
          - 过大写权限声明（contents: write）：${WRITE_PERM_HITS}

          ## 建议

          1. 凭证统一通过 Header 传递（如 \\`X-Upload-Key\\`），避免 query 参数泄露。
          2. 路径 containment 使用 \\`Path.resolve() + is_relative_to()\\`。
          3. PR 审查流程保持只读，不启用自动执行和自动改码。
          4. Workflow 权限按最小权限收敛，PR 场景优先 \\`contents: read\\`。
          EOF

      - name: Comment review result
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/review_result.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## 🤖 AI PR 审查\n\n${body}`,
            });

name: PR AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build review prompt from PR diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr.diff
          head -n 1800 /tmp/pr.diff > /tmp/pr.diff.short

          gh pr view ${{ github.event.pull_request.number }} --json title,body --jq '.title' > /tmp/pr.title
          gh pr view ${{ github.event.pull_request.number }} --json title,body --jq '.body // ""' > /tmp/pr.body

          cat > /tmp/review.prompt <<'EOF'
          你是资深代码审查员。请基于给定 PR 信息输出中文审查结果。

          要求：
          1) 按 P0/P1/P2 分级列出问题（没有就写“未发现”）。
          2) 每条问题包含：文件路径、风险说明、修复建议。
          3) 给出测试覆盖建议。
          4) 最后给出结论：允许合并 / 需修复后合并 / 阻断合并。
          5) 只基于给定信息，不要臆测仓库外内容。

          额外安全关注：
          - 凭证泄露（query 参数、日志、Referer）
          - 路径穿越/不安全路径校验
          - 过大 workflow 权限
          - 会导致 CI 或线上不可用的改动
          EOF

          {
            echo ""
            echo "PR 标题："
            cat /tmp/pr.title
            echo ""
            echo "PR 描述："
            cat /tmp/pr.body
            echo ""
            echo "代码变更（diff）："
            cat /tmp/pr.diff.short
          } >> /tmp/review.prompt

      - name: Run AI Review (read-only)
        env:
          CUSTOM_OPENAI_KEY: ${{ secrets.CODEX_API_KEY }}
          CODEX_API_BASE: ${{ secrets.CODEX_API_BASE }}
        run: |
          if [ -z "${CUSTOM_OPENAI_KEY}" ] || [ -z "${CODEX_API_BASE}" ]; then
            echo "未配置 CODEX_API_KEY 或 CODEX_API_BASE，跳过 AI 审查" > /tmp/review_result.md
            exit 0
          fi

          python3 - <<'PY'
          import json
          import os
          import urllib.request

          base = os.environ["CODEX_API_BASE"].rstrip("/")
          url = base + "/chat/completions"
          key = os.environ["CUSTOM_OPENAI_KEY"]
          prompt = open('/tmp/review.prompt', 'r', encoding='utf-8').read()

          payload = {
              "model": "gpt-5.2",
              "temperature": 0.1,
              "messages": [
                  {"role": "system", "content": "你是严格、简洁、可执行的代码审查员。"},
                  {"role": "user", "content": prompt},
              ],
          }

          req = urllib.request.Request(
              url,
              data=json.dumps(payload).encode('utf-8'),
              headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {key}",
              },
              method="POST",
          )

          try:
              with urllib.request.urlopen(req, timeout=180) as resp:
                  body = json.loads(resp.read().decode('utf-8'))
              content = body["choices"][0]["message"]["content"]
              if isinstance(content, list):
                  out = "\n".join(
                      x.get("text", "") if isinstance(x, dict) else str(x)
                      for x in content
                  ).strip()
              else:
                  out = str(content).strip()
              if not out:
                  out = "审查执行完成，但未返回内容。"
          except Exception as e:
              out = f"审查执行失败：{e}"

          with open('/tmp/review_result.md', 'w', encoding='utf-8') as f:
              f.write(out)
          PY

      - name: Comment review result
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/review_result.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## 🤖 AI PR 审查\n\n${body}`,
            });

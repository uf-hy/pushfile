# 同步 main ← production
# main 作为 production 的别名，保持永远一致
name: Sync main

on:
  push:
    branches: [production]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: production
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Push to main
        run: git push origin production:main --force
